---

- name: reboot shelly
  ansible.builtin.uri:
    method: get
    url: "http://{{ ansible_host }}/reboot"
    url_password: "{{ shellies.web.pass }}"
    url_username: "{{ shellies.web.user }}"
  delegate_to: localhost
  register: reboot_result
  failed_when: reboot_result.status != 200

- name: wait till shelly is back
  ansible.builtin.uri:
    method: get
    url: "http://{{ ansible_host }}/shelly"
  delegate_to: localhost
  register: response
  retries: 50
  delay: 10
  until: response is defined and response.status == 200
