---
- hosts: all
  name: gather all information from shellies
  gather_facts: false
  connection: local
  roles:
    - shelly-get-gen

  tasks:
  - name: set v1 roles
    ansible.builtin.set_fact:
      shellyroles: 
        # - shelly-set-defaults
        - shelly-gather
    when: shellygen == 1

  - name: set V2 roles
    ansible.builtin.set_fact:
      shellyroles:
        # - shellyV2-set-password
        # - shellyV2-set-defaults
        - shellyV2-gather
    when: shellygen == "2"

  - name: set v3 roles
    ansible.builtin.set_fact:
      shellyroles:
        # - shellyV2-set-password
        # - shellyV2-set-defaults
        - shellyV2-gather
    when: shellygen == "3"

  - name: play all neded gen 1 roles
    include_role:
      name: "{{ item }}"
    loop: "{{ shellyroles }}"

