---
- name: Shelly Gen1 - Timeserver setzen
  hosts: shelly_gen1
  gather_facts: false
  vars:
    ntp_server: "192.168.178.4"
  tasks:
    - name: Variablen anzeigen
      debug:
        msg: "Host: {{ ansible_host }} User: {{ ansible_user }}"

    - name: Aktuelle Konfiguration lesen
      ansible.builtin.uri:
        url: "http://{{ ansible_host }}/settings"
        url_username: "{{ ansible_user }}"
        url_password: "{{ ansible_password }}"
        method: GET
        force_basic_auth: yes
        timeout: 10
      register: current

    - name: Timeserver konfigurieren
      ansible.builtin.uri:
        url: "http://{{ ansible_host }}/settings?sntp_server={{ ntp_server }}"
        url_username: "{{ ansible_user }}"
        url_password: "{{ ansible_password }}"
        method: GET
        force_basic_auth: yes
        timeout: 10
      register: result
      when: current.json.sntp.server != ntp_server
      changed_when: true

    - name: Ergebnis anzeigen
      debug:
        msg: "Timeserver bereits korrekt: {{ current.json.sntp.server }}"
      when: current.json.sntp.server == ntp_server

    - name: Ergebnis anzeigen
      debug:
        msg: "Timeserver gesetzt auf: {{ result.json.sntp.server }}"
      when: current.json.sntp.server != ntp_server
